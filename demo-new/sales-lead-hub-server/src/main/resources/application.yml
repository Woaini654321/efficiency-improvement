server:
  # 前端 dev 也默认 8080，后端错开到 8081 避免本机同时启动时端口冲突
  port: 8081
  servlet:
    # 微服务上下文=sales-lead-hub，与前端 VITE_API_DEFAULT_SERVICE_BASE_URL 第一段成对（联调 STEP 00.6）。
    # 生效后 /me → /sales-lead-hub/me；前端 q-cli.config.ts 代理 rewrite 去掉 /api 前缀后正好对上。
    context-path: /sales-lead-hub

spring:
  # 敏感口令从 application-local.yml 覆盖注入（该文件被同目录 .gitignore 忽略，不提交）；
  # 生产可改走环境变量 ${DB_PASSWORD} / ${SWAGGER_PASSWORD}。yml 本体只留占位，不写明文口令。
  config:
    import: optional:classpath:application-local.yml
  application:
    name: sales-lead-hub-server

quectel:
  # 数据源必须写在 quectel.mysql 下，不是 spring.datasource。
  # 取证：mysql-starter 的 MySQLEnvironmentPostProcessor 读 quectel.mysql.{server,port,database,uname,pwd}，
  # 据此拼 URL 并生成 spring.datasource.dynamic.datasource.mysql_<database> + spring.datasource.dynamic.primary。
  # 写成标准的 spring.datasource.* 框架完全不读 → 启动后首次访问 DB 报
  # "dynamic-datasource can not find primary datasource"。
  # 单体项目（无 cloud-starter）连接信息全部写本文件；微服务才由 Nacos base.yaml 提供。
  mysql:
    server: 192.168.10.28
    port: 3306
    # 库名约定 = artifactId 的 - 换 _
    database: sales_lead_hub_server
    uname: root
    pwd: ${DB_PASSWORD:}
  web:
    swagger-auth:
      username: admin
      password: ${SWAGGER_PASSWORD:}
  base:
    # security-starter 用它拼装 UAA 地址（开发环境网关）。换 test/prod 改此行即可。
    gateway-url: http://192.168.10.27:8088/api
