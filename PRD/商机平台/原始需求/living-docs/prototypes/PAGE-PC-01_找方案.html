<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 - Quectel商机互助平台</title>
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/antd.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="prototype-shell.js"></script>
  <script src="data-tracker.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; -webkit-font-smoothing: antialiased; }

    /* ===== Animations ===== */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    @keyframes pulse-ring { 0% { transform:scale(0.8); opacity:1; } 100% { transform:scale(2.2); opacity:0; } }
    @keyframes gridMove { 0% { background-position:0 0, 0 0; } 100% { background-position:40px 40px, -40px -40px; } }

    /* ===== Page Container ===== */
    .page-container { padding: 0 0 48px; }

    /* ===== Hero Section ===== */
    .hero-wrapper {
      position: relative; margin: 0 0 28px; border-radius: 24px;
      background: linear-gradient(160deg, #0a1628 0%, #0d2137 30%, #0f3460 60%, #0a2540 100%);
      padding: 64px 56px 52px; overflow: hidden; isolation: isolate;
    }
    .hero-wrapper::before {
      content: ''; position: absolute; inset: 0; z-index: 0; opacity: 0.08;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    .hero-wrapper::after {
      content: ''; position: absolute; top: -200px; right: -120px; width: 600px; height: 600px;
      border-radius: 50%; z-index: 0;
      background: radial-gradient(circle, rgba(24,144,255,0.15) 0%, transparent 70%);
    }
    .hero-glow-bottom {
      position: absolute; bottom: -80px; left: 10%; width: 500px; height: 300px;
      border-radius: 50%; z-index: 0;
      background: radial-gradient(ellipse, rgba(114,46,209,0.12) 0%, transparent 70%);
    }
    .hero-glow-right {
      position: absolute; top: -100px; right: 15%; width: 400px; height: 400px;
      border-radius: 50%; z-index: 0;
      background: radial-gradient(circle, rgba(19,194,194,0.1) 0%, transparent 70%);
    }
    .hero-content { position: relative; z-index: 2; text-align: center; max-width: 800px; margin: 0 auto; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px; color: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
    }
    .hero-badge .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #52c41a; position: relative; }
    .hero-badge .live-dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: #52c41a; animation: pulse-ring 2s ease-out infinite; }
    .hero-title { font-size: 38px; font-weight: 800; color: #fff; margin-bottom: 12px; letter-spacing: -0.5px; line-height: 1.25; }
    .hero-title .brand { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-subtitle { font-size: 16px; color: rgba(255,255,255,0.55); margin-bottom: 36px; line-height: 1.6; max-width: 580px; margin-left: auto; margin-right: auto; }
    .hero-search-wrap { max-width: 640px; margin: 0 auto; }
    .hero-stats-row { display: flex; justify-content: center; gap: 40px; margin-top: 36px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.08); }
    .hero-stat-item { text-align: center; }
    .hero-stat-num { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.1; }
    .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; }

    /* ===== Hot Tags ===== */
    .hot-tags-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px; flex-wrap:wrap; }
    .hot-tag {
      padding:4px 14px; border-radius:20px; font-size:12px; color:rgba(255,255,255,0.7);
      background:rgba(255,255,255,0.08); cursor:pointer; border:1px solid rgba(255,255,255,0.06);
      transition:all 0.25s; backdrop-filter:blur(4px);
    }
    .hot-tag:hover { background:rgba(255,255,255,0.18); color:#fff; border-color:rgba(255,255,255,0.2); transform:translateY(-1px); }

    /* ===== Content Sections ===== */
    .content-section { margin-bottom: 24px; }

    .section-header-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
    }
    .section-title-group { display: flex; align-items: center; gap: 10px; }
    .section-title-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .section-title-text { font-size: 18px; font-weight: 700; color: #1a1a2e; }
    .section-title-sub { font-size: 13px; color: #bfbfbf; font-weight: 400; }
    .section-more-link { font-size: 13px; color: #1890ff; text-decoration: none; font-weight: 500; transition: all 0.2s; display:flex; align-items:center; gap:4px; }
    .section-more-link:hover { color: #1677ff; gap: 8px; }

    /* ===== Quick Actions - Larger ===== */
    .quick-actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .quick-action-item {
      background: #fff; border-radius: 18px; padding: 28px 20px; text-align: center;
      cursor: pointer; border: 1px solid #f0f0f0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      text-decoration: none; display: block; position: relative; overflow: hidden;
    }
    .quick-action-item::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      opacity: 0; transition: opacity 0.35s;
    }
    .quick-action-item:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); border-color: transparent; }
    .quick-action-item:hover::after { opacity: 1; }
    .quick-icon-circle {
      width: 60px; height: 60px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 26px; transition: transform 0.35s;
    }
    .quick-action-item:hover .quick-icon-circle { transform: scale(1.1); }
    .quick-item-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .quick-item-desc { font-size: 12px; color: #bfbfbf; }

    /* ===== My Tasks Dashboard ===== */
    .my-tasks-dashboard {
      background: #fff; border-radius: 18px; overflow: hidden;
      border: 1px solid #f0f0f0; transition: box-shadow 0.3s;
    }
    .my-tasks-dashboard:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .my-tasks-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid #f5f5f5;
    }
    .my-tasks-header-left { display: flex; align-items: center; gap: 12px; }
    .my-tasks-header-icon {
      width: 42px; height: 42px; border-radius: 12px; background: #e6f7ff;
      display: flex; align-items: center; justify-content: center; font-size: 20px; color: #1890ff;
    }
    .my-tasks-header-title { font-size: 17px; font-weight: 700; color: #1a1a2e; }
    .my-tasks-count-badges { display: flex; gap: 8px; margin-left: 12px; }
    .my-tasks-count-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
      white-space: nowrap;
    }
    .my-tasks-header-right { display: flex; align-items: center; gap: 12px; }
    .my-tasks-more-link { font-size: 13px; color: #1890ff; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 4px; transition: gap 0.2s; }
    .my-tasks-more-link:hover { gap: 8px; }
    .my-tasks-list { padding: 8px 24px; }
    .my-task-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid #fafafa; transition: all 0.2s;
    }
    .my-task-item:last-child { border-bottom: none; }
    .my-task-item:hover { padding-left: 6px; }
    .my-task-priority-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .my-task-info { flex: 1; min-width: 0; }
    .my-task-desc {
      font-size: 14px; color: #1a1a2e; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 4px;
    }
    .my-task-meta { font-size: 12px; color: #8c8c8c; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .my-task-meta i { font-size: 13px; margin-right: 2px; }
    .my-task-deadline-overdue { color: #ff4d4f; font-weight: 600; }
    .my-task-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .my-tasks-empty { text-align: center; padding: 36px 0; }
    @keyframes overdueBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .overdue-blink { animation: overdueBlink 1s ease-in-out infinite; }

    /* ===== Solution Grid ===== */
    .solution-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .solution-item {
      background: #fff; border-radius: 18px; overflow: hidden; cursor: pointer;
      border: 1px solid #f0f0f0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      position: relative;
    }
    .solution-item:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.1); border-color: #91d5ff; }
    .solution-cover {
      height: 140px; position: relative; overflow: hidden;
    }
    .solution-cover-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .solution-item:hover .solution-cover-img { transform: scale(1.06); }
    .solution-cover::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.25) 100%);
      pointer-events: none;
    }
    .solution-rank-badge {
      position: absolute; top: 12px; left: 12px;
      background: linear-gradient(135deg, #ff7a45, #ff4d4f);
      color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(255,77,79,0.3);
    }
    .solution-sub-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,0.9); color: #1890ff; font-size: 10px; padding: 3px 10px; border-radius: 6px;
      display: inline-flex; align-items: center; gap: 4px; font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .solution-body { padding: 16px 18px 18px; }
    .solution-item-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .solution-item-meta { display:flex; align-items:center; justify-content:space-between; font-size:12px; color:#8c8c8c; }
    .solution-item-author { font-size:11px; color:#bfbfbf; margin-top:6px; }

    /* ===== Layout: Tools + Discussion ===== */
    .layout-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    /* ===== Tools Panel ===== */
    .tools-panel {
      background: #fff; border-radius: 18px; overflow: hidden;
      border: 1px solid #f0f0f0; transition: box-shadow 0.3s;
    }
    .tools-panel:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .tools-header {
      background: linear-gradient(135deg, #0a1628 0%, #102240 50%, #0d1f3c 100%);
      padding: 22px 24px; display: flex; align-items: center; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .tools-header::before {
      content: ''; position: absolute; top: -60px; right: -40px; width: 160px; height: 160px;
      border-radius: 50%; background: rgba(19,194,194,0.06); pointer-events: none;
    }
    .tools-header-info { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .tools-header-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(19,194,194,0.15); display: flex; align-items: center; justify-content: center;
    }
    .tools-header-title { font-size: 16px; font-weight: 700; color: #fff; }
    .tools-header-desc { font-size: 11px; color: rgba(255,255,255,0.45); }
    .tools-enter-btn {
      display: inline-flex; align-items: center; gap: 4px; padding: 7px 16px;
      border-radius: 20px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
      font-size: 12px; text-decoration: none; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1); transition: all 0.25s; position: relative; z-index: 1;
    }
    .tools-enter-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .tools-intel-item {
      display: flex; align-items: center; gap: 14px; padding: 16px 24px;
      text-decoration: none; cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid #fafafa;
    }
    .tools-intel-item:last-of-type { border-bottom: none; }
    .tools-intel-item:hover { background: #fafbfd; }
    .tools-intel-brand {
      width: 46px; height: 46px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .tools-bottom-links { display: flex; border-top: 1px solid #f5f5f5; }
    .tools-bottom-link {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 13px 0; text-decoration: none; font-size: 12px; color: #595959;
      font-weight: 500; transition: all 0.2s; border-right: 1px solid #f5f5f5;
    }
    .tools-bottom-link:last-child { border-right: none; }
    .tools-bottom-link:hover { background: #fafafa; }

    /* ===== Discussion Panel ===== */
    .discuss-panel {
      background: #fff; border-radius: 18px; padding: 24px;
      border: 1px solid #f0f0f0; transition: box-shadow 0.3s;
    }
    .discuss-panel:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .discuss-list-item {
      display: flex; align-items: flex-start; gap: 14px; padding: 15px 0;
      border-bottom: 1px solid #fafafa; cursor: pointer; transition: all 0.25s;
    }
    .discuss-list-item:last-child { border-bottom: none; }
    .discuss-list-item:hover { padding-left: 8px; }
    .discuss-topic-tag {
      display: inline-flex; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px;
    }

    /* ===== Activity Feed ===== */
    .activity-panel { background: #fff; border-radius: 18px; padding: 24px; border: 1px solid #f0f0f0; }
    .activity-timeline-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid #fafafa; align-items: flex-start; }
    .activity-timeline-item:last-child { border-bottom: none; }
    .activity-avatar-dot {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 600;
    }

    /* ===== Announcement Banner ===== */
    .ann-banner {
      margin-bottom: 24px; background: #fff; border-radius: 16px;
      border: 1px solid #f0f0f0; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: box-shadow 0.3s;
    }
    .ann-banner:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .ann-banner-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid #f5f5f5;
      background: linear-gradient(90deg, #fafbff, #fff);
    }
    .ann-banner-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: #1a1a2e;
    }
    .ann-banner-title i { color: #1890ff; font-size: 20px; }
    .ann-banner-more {
      font-size: 13px; color: #1890ff; text-decoration: none;
      display: flex; align-items: center; gap: 4px; font-weight: 500; transition: gap 0.2s;
    }
    .ann-banner-more:hover { gap: 8px; }
    .ann-banner-list { padding: 0; }
    .ann-banner-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid #fafafa; text-decoration: none;
    }
    .ann-banner-item:last-child { border-bottom: none; }
    .ann-banner-item:hover { background: #fafbfd; }
    .ann-banner-item .ann-banner-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 18px;
    }
    .ann-banner-item .ann-banner-body { flex: 1; min-width: 0; }
    .ann-banner-item .ann-banner-item-title {
      font-size: 14px; font-weight: 600; color: #1a1a2e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .ann-banner-item .ann-banner-item-meta {
      font-size: 12px; color: #8c8c8c; display: flex; align-items: center; gap: 12px;
    }
    .ann-banner-item .ann-banner-item-meta i { font-size: 13px; margin-right: 2px; }
    .ann-banner-empty {
      padding: 20px 24px; text-align: center; color: #bfbfbf; font-size: 13px;
    }
    @media (max-width: 768px) {
      .ann-banner { margin-bottom: 16px; }
      .ann-banner-item { padding: 12px 16px; }
      .ann-banner-header { padding: 12px 16px; }
    }

    /* ===== Responsive ===== */
    @media (max-width: 1200px) {
      .solution-grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 1024px) {
      .quick-actions-grid { grid-template-columns: repeat(2, 1fr); }
      .layout-2col { grid-template-columns: 1fr; }
      .hero-wrapper { padding: 44px 28px 36px; }
      .hero-title { font-size: 28px; }
    }
    @media (max-width: 768px) {
      .quick-actions-grid { grid-template-columns: repeat(2, 1fr); }
      .solution-grid-4 { grid-template-columns: 1fr; }
      .my-tasks-header { flex-wrap: wrap; gap: 12px; }
      .my-tasks-count-badges { margin-left: 0; }
      .my-task-item { flex-wrap: wrap; }
      .hero-title { font-size: 24px; }
      .hero-stats-row { gap: 20px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
(function(){
  const { useState, useEffect, useMemo } = React;
  const { Button, Tag, Input, Spin, Empty, Badge, Avatar, Cascader, Select, Pagination, Tooltip } = antd;

  const TYPE_LABELS = { product_info: '产品信息', solution: '解决方案', success_case: '成功案例' };
  const TYPE_COLORS = { product_info: 'blue', solution: 'green', success_case: 'orange' };
  const TYPE_HEX = { product_info: '#1890ff', solution: '#52c41a', success_case: '#fa8c16' };

  // Mock：36条方案
  const MOCK_OPPS = (function() {
    var types = ['product_info','solution','success_case'];
    var titles = ['EC200A Cat.1模组低功耗方案','RG500Q 5G模组车载集成方案','BC260Y NB-IoT智慧表计案例','AG525R 车载前装解决方案','EC800M Cat.1 DTU行业应用','SC66 智能模组Android方案','RG200U Cat.1bis模组产品手册','FC41D Wi-Fi&BLE双模方案','EG912Y Cat.4模组海外部署案例','BG95-M3 多模LPWA全球方案','LC29H GNSS双频定位方案','SG865W-WF 5G+WiFi6方案'];
    var pubs = ['Tony.Zhang 张伟','Nina.Li 李娜','Kevin.Wang 王强','Yan.Chen 陈燕','Leo.Zhao 赵磊','Owen.Liu 刘洋'];
    var cats = [['Cat.1模组','IoT模组'],['5G模组','车载方案'],['NB-IoT模组','智慧表计'],['车载方案'],['Cat.1模组','IoT模组','行业方案'],['智能模组']];
    var arr = [];
