<style>
.page-container { padding: 24px; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
.batch-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #e6f4ff; border-radius: 6px; margin-top: 12px; }
.batch-bar .count { font-weight: 600; color: #1677ff; }
.sort-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
.drag-row.dragging { opacity: 0.4; background: #f0f5ff; }
.drag-row.drag-over { border-top: 2px solid #1890ff; }
.drag-handle { cursor: grab; color: #bfbfbf; padding: 6px 4px; border-radius: 4px; transition: all 0.2s; display: inline-flex; align-items: center; user-select: none; }
.drag-handle:hover { color: #1890ff; background: #f0f5ff; }
.drag-handle:active { cursor: grabbing; color: #1890ff; }
.pinned-row { background: #e6f7ff !important; }
.pinned-row td { background: #e6f7ff !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useRef } = React;
const {
  Typography, Segmented, Input, Select, DatePicker, Table, Tag, Space, Button,
  Dropdown, Modal, message, Checkbox, Drawer, Switch, Cascader, Upload
} = antd;
const { Title } = Typography;
const { RangePicker } = DatePicker;


const opportunityStatuses = ['已发布', '已下架'];
const demandStatuses = ['待响应', '收集中', '已采纳', '已关闭'];

const statusColorMap = {
  '已发布': 'green', '已下架': 'red',
  '待响应': 'orange', '收集中': 'blue', '已采纳': 'green', '已关闭': 'default'
};

const publishers = ['San.Zhang 张三', 'Si.Li 李四', 'Wu.Wang 王五', 'Liu.Zhao 赵六'];

const urgencyOptions = [
  { label: '普通', value: 'normal' },
  { label: '紧急', value: 'urgent' },
  { label: '特急', value: 'critical' }
];
const urgencyMap = { normal: '普通', urgent: '紧急', critical: '特急' };

const categoryTree = [
  { value: 'product-line', label: '产品线', children: [
    { value: '5g-module', label: '5G模组' },
    { value: '4g-module', label: '4G模组' },
    { value: 'wifi-module', label: 'WiFi模组' },
    { value: 'nbiot', label: 'NB-IoT' }
  ]},
  { value: 'solution', label: '解决方案', children: [
    { value: 'smart-city', label: '智慧城市' },
    { value: 'vehicle', label: '车联网' },
    { value: 'iiot', label: '工业物联网' }
  ]},
  { value: 'case', label: '成功案例', children: [
    { value: 'carrier', label: '运营商' },
    { value: 'enterprise', label: '企业客户' }
  ]}
];

const mockData = [
  { id: 1, sort: 1, title: '5G模组NB-IoT解决方案合作', type: '方案信息', publisher: 'San.Zhang 张三', status: '已发布', time: '2026-05-20 10:30', pinned: true, description: '提供5G模组NB-IoT端到端解决方案，支持SA/NSA双模，覆盖智慧城市、工业物联网等场景。方案包含硬件选型、网络架构设计和平台对接。', category: [['product-line','5g-module'],['solution','smart-city']], industry: 'IoT、智慧城市', tags: ['5G','NB-IoT','双模'], urgency: 'normal' },
  { id: 2, sort: 2, title: '智慧农业传感器模组需求', type: '方案需求', publisher: 'Si.Li 李四', status: '收集中', time: '2026-05-19 14:20', pinned: false, description: '需要低功耗传感器模组用于智慧农业场景，要求支持LoRa/WiFi双通道，待机功耗<100μA，工作温度-40~85℃。', category: [['product-line','wifi-module']], industry: '智慧农业', tags: ['低功耗','传感器','LoRa'], urgency: 'urgent' },
  { id: 3, sort: 3, title: 'Cat.1模组批量采购方案', type: '方案信息', publisher: 'Wu.Wang 王五', status: '已发布', time: '2026-05-18 09:15', pinned: false, description: 'Cat.1模组批量采购需求，预计年用量50万片，用于智能电表、POS机等终端设备。要求模组通过国内运营商认证。', category: [['product-line','4g-module']], industry: '智能表计、金融POS', tags: ['Cat.1','批量采购','智能电表'], urgency: 'normal' },
  { id: 4, sort: 4, title: '车载T-Box通信模组定制需求', type: '方案需求', publisher: 'Liu.Zhao 赵六', status: '已采纳', time: '2026-05-17 16:45', pinned: true, description: '车载前装T-Box需要定制通信模组，要求车规级AEC-Q100认证，支持5G+C-V2X，工作温度-40~105℃。', category: [['product-line','5g-module'],['solution','vehicle']], industry: '车联网', tags: ['T-Box','车规级','C-V2X'], urgency: 'critical' },
  { id: 5, sort: 5, title: 'Wi-Fi 6模组海外市场拓展', type: '方案信息', publisher: 'San.Zhang 张三', status: '已下架', time: '2026-05-16 11:00', pinned: false, description: 'Wi-Fi 6模组海外市场合作机会，目标市场为欧洲和北美，需要支持CE/FCC认证，提供完整SDK和参考设计。', category: [['product-line','wifi-module']], industry: '海外市场', tags: ['Wi-Fi6','海外','CE/FCC'], urgency: 'normal' },
  { id: 6, sort: 6, title: '工业DTU远程监控方案需求', type: '方案需求', publisher: 'Si.Li 李四', status: '待响应', time: '2026-05-15 08:30', pinned: false, description: '工业DTU远程监控需要4G模组方案，要求支持Modbus RTU/TCP协议转换，集成MQTT协议栈，支持断网续传。', category: [['solution','iiot']], industry: '工业物联网', tags: ['DTU','Modbus','MQTT'], urgency: 'urgent' },
  { id: 7, sort: 7, title: 'GNSS高精度定位模组合作', type: '方案信息', publisher: 'Wu.Wang 王五', status: '已发布', time: '2026-05-14 13:50', pinned: false, description: 'GNSS高精度定位模组合作方案，支持GPS/BDS/GLONASS多星座，定位精度亚米级，适用于自动驾驶和精准农业。', category: [['product-line','5g-module']], industry: '自动驾驶、精准农业', tags: ['GNSS','高精度定位','多星座'], urgency: 'normal' },
  { id: 8, sort: 8, title: '智能表计NB-IoT模组集采需求', type: '方案需求', publisher: 'Liu.Zhao 赵六', status: '已关闭', time: '2026-05-13 17:10', pinned: false, description: '智能表计集中采购NB-IoT模组，预计总量200万片/年，要求支持3GPP R14，PSM/eDRX低功耗模式，需通过燃气表防爆认证。', category: [['product-line','nbiot']], industry: '智能表计', tags: ['NB-IoT','集采','低功耗'], urgency: 'normal' },
];

function ContentAuditPage() {
  const [segType, setSegType] = useState('方案信息');
  const [keyword, setKeyword] = useState('');
  const [statusFilter, setStatusFilter] = useState(undefined);
  const [publisherFilter, setPublisherFilter] = useState(undefined);
  const [dateRange, setDateRange] = useState(null);
  const [selectedRowKeys, setSelectedRowKeys] = useState([]);
  const [offlineModalOpen, setOfflineModalOpen] = useState(false);
  const [offlineRecord, setOfflineRecord] = useState(null);
  const [offlineReason, setOfflineReason] = useState('');
  const [dataSource, setDataSource] = useState(mockData);
  const [sortField, setSortField] = useState('time');
  const [sortOrder, setSortOrder] = useState('descend');
  const [editModalOpen, setEditModalOpen] = useState(false);
  const [editRecord, setEditRecord] = useState(null);
  const [editSortOpen, setEditSortOpen] = useState(false);
  const [sortList, setSortList] = useState([]);
  // ---- 行内上下箭头手动排序状态 ----
  const [sortDirty, setSortDirty] = useState(false);
  // ---- 替发方案 Modal 状态 ----
  const [proxyModalOpen, setProxyModalOpen] = useState(false);
  const [proxyForm, setProxyForm] = useState({ title: '', description: '', publisher: 'Tony.Zhang 张伟', category: [], industry: '', tags: [], urgency: 'normal', type: '方案信息' });
  const [proxyNotify, setProxyNotify] = useState(true);

  // ---- 拖拽排序状态 ----
  const dragRowRef = useRef(null);
  const dragOverRowRef = useRef(null);

  const currentStatuses = segType === '方案信息' ? opportunityStatuses : demandStatuses;

  // 当前类型下的全量列表（用于排序弹窗）
  const segFilteredList = useMemo(() => {
    return dataSource.filter(r => r.type === segType);
  }, [dataSource, segType]);

  // 排序弹窗打开时，复制当前列表到 sortList
  var openSortModal = useCallback(function() {
    setSortList(segFilteredList.slice().sort(function(a, b) { return a.sort - b.sort; }));
    setEditSortOpen(true);
  }, [segFilteredList]);

  // 排序弹窗内上移
  var handleSortUp = useCallback(function(index) {
    if (index <= 0) return;
    setSortList(function(prev) {
      var arr = prev.slice();
      var tmp = arr[index - 1];
      arr[index - 1] = arr[index];
      arr[index] = tmp;
      return arr;
    });
  }, []);

  // 排序弹窗内下移
  var handleSortDown = useCallback(function(index) {
    setSortList(function(prev) {
      if (index >= prev.length - 1) return prev;
      var arr = prev.slice();
      var tmp = arr[index + 1];
      arr[index + 1] = arr[index];
      arr[index] = tmp;
      return arr;
    });
  }, []);

  // 保存排序
  var handleSaveSort = useCallback(function() {
    var newOrder = {};
    sortList.forEach(function(item, i) {
      newOrder[item.id] = i + 1;
    });
    setDataSource(function(prev) {
      return prev.map(function(r) {
        if (newOrder[r.id] !== undefined) {
          return Object.assign({}, r, { sort: newOrder[r.id] });
        }
        return r;
      });
    });
    setEditSortOpen(false);
    message.success('排序已保存，列表已按新顺序展示');
  }, [sortList]);

  // ---- 行内手动排序：点击上下箭头交换 sort 值 ----
  var handleRowSortUp = useCallback(function(record) {
    setDataSource(function(prev) {
      // 在符合条件的排序列表中找到上一条
      var sameType = prev.filter(function(r) { return r.type === segType; });
      sameType.sort(function(a, b) { return a.sort - b.sort; });
      var idx = sameType.findIndex(function(r) { return r.id === record.id; });
      if (idx <= 0) return prev;
      var above = sameType[idx - 1];
      var newSortA = above.sort;
      var newSortB = record.sort;
      return prev.map(function(r) {
        if (r.id === above.id) return Object.assign({}, r, { sort: newSortB });
        if (r.id === record.id) return Object.assign({}, r, { sort: newSortA });
        return r;
      });
    });
    setSortDirty(true);
  }, [segType]);

  var handleRowSortDown = useCallback(function(record) {
    setDataSource(function(prev) {
      var sameType = prev.filter(function(r) { return r.type === segType; });
      sameType.sort(function(a, b) { return a.sort - b.sort; });
      var idx = sameType.findIndex(function(r) { return r.id === record.id; });
      if (idx < 0 || idx >= sameType.length - 1) return prev;
      var below = sameType[idx + 1];
      var newSortA = below.sort;
      var newSortB = record.sort;
      return prev.map(function(r) {
        if (r.id === below.id) return Object.assign({}, r, { sort: newSortB });
        if (r.id === record.id) return Object.assign({}, r, { sort: newSortA });
        return r;
      });
    });
    setSortDirty(true);
  }, [segType]);

  var handleSaveInlineSort = useCallback(function() {
    setSortDirty(false);
    message.success('排序已保存');
  }, []);

  // ---- 替发方案 ----
  var resetProxyForm = function() {
    setProxyForm({ title: '', description: '', publisher: 'Tony.Zhang 张伟', category: [], industry: '', tags: [], urgency: 'normal', type: '方案信息' });
    setProxyNotify(true);
  };

  var handleProxySubmit = useCallback(function() {
    var f = proxyForm;
    if (!f.title || !f.title.trim()) { message.warning('标题不能为空'); return; }
    if (!f.description || !f.description.trim()) { message.warning('内容描述不能为空'); return; }
    setDataSource(function(prev) {
      var maxSort = prev.reduce(function(m, r) { return Math.max(m, r.sort || 0); }, 0);
      var newItem = {
        id: Date.now(),
        sort: maxSort + 1,
        title: f.title,
        type: f.type,
        publisher: f.publisher,
        status: '已发布',
        time: dayjs().format('YYYY-MM-DD HH:mm'),
        pinned: false,
        description: f.description,
        category: f.category,
        industry: f.industry,
        tags: f.tags,
        urgency: f.urgency
      };
      return [newItem].concat(prev);
    });
    message.success('已替 ' + f.publisher + ' 发布方案');
    if (proxyNotify) {
      message.info('已同步发送邮件通知订阅用户');
    }
    setProxyModalOpen(false);
    resetProxyForm();
  }, [proxyForm, proxyNotify]);

  const filteredData = useMemo(() => {
    var filtered = dataSource.filter(r => {
      if (r.status === '草稿') return false;
      if (r.type !== segType) return false;
      if (keyword && !r.title.includes(keyword)) return false;
      if (statusFilter && r.status !== statusFilter) return false;
      if (publisherFilter && r.publisher !== publisherFilter) return false;
      if (dateRange && dateRange[0] && dateRange[1]) {
        const t = dayjs(r.time);
        if (t.isBefore(dateRange[0], 'day') || t.isAfter(dateRange[1], 'day')) return false;
      }
      return true;
    });
    /* 按 sort 字段排序（手动排序） */
    filtered.sort(function(a, b) { return a.sort - b.sort; });
    /* 置顶分组：置顶项在前，非置顶项在后 */
    var pinned = filtered.filter(function(r) { return r.pinned; });
    var unpinned = filtered.filter(function(r) { return !r.pinned; });
    /* 如果有列排序，再应用列排序 */
    var compareFn;
    if (sortField === 'time') {
      compareFn = function(a, b) {
        var ta = dayjs(a.time).valueOf(), tb = dayjs(b.time).valueOf();
        return sortOrder === 'descend' ? tb - ta : ta - tb;
      };
    } else if (sortField === 'title') {
      compareFn = function(a, b) {
        var cmp = a.title.localeCompare(b.title, 'zh');
        return sortOrder === 'descend' ? -cmp : cmp;
      };
    }
    if (compareFn) {
      pinned.sort(compareFn);
      unpinned.sort(compareFn);
    }
    return pinned.concat(unpinned);
  }, [dataSource, segType, keyword, statusFilter, publisherFilter, dateRange, sortField, sortOrder]);

  const handleView = (record) => {
    const url = record.type === '方案信息'
      ? 'PAGE-PC-02_商机详情页.html'
      : 'PAGE-PC-05_需求详情页.html';
    window.open(url, '_blank');
  };

  const handleOffline = (record) => {
    setOfflineRecord(record);
    setOfflineReason('');
    setOfflineModalOpen(true);
  };

  const confirmOffline = () => {
    if (!offlineReason.trim()) {
      message.warning('请填写下架原因');
      return;
    }
    setDataSource(prev => prev.map(r => r.id === offlineRecord.id ? { ...r, status: '已下架' } : r));
    message.success('已下架，已通知发布者 (BR-042)');
    setOfflineModalOpen(false);
    setSelectedRowKeys(prev => prev.filter(k => k !== offlineRecord.id));
  };

  const handleDelete = (record) => {
    Modal.confirm({
      title: '确认删除',
      icon: React.createElement('i', {className:"ti ti-alert-circle", style:{fontSize:18}}),
      content: '确认删除？数据保留180天 (BR-043软删除)',
      okText: '确认删除',
      okType: 'danger',
      cancelText: '取消',
      onOk() {
        setDataSource(prev => prev.filter(r => r.id !== record.id));
        setSelectedRowKeys(prev => prev.filter(k => k !== record.id));
        message.success('已删除');
      }
    });
  };

  const handleBatchOffline = () => {
    if (selectedRowKeys.length > 50) {
      message.warning('单次批量操作不超过50条 (BR-044)');
      return;
    }
    const canOffline = filteredData.filter(r => selectedRowKeys.includes(r.id) && r.status === '已发布');
    if (canOffline.length === 0) {
      message.warning('所选项中没有可下架的内容（仅"已发布"状态可下架）');
      return;
    }
    setOfflineRecord({ id: '__batch__', ids: canOffline.map(r => r.id) });
    setOfflineReason('');
    setOfflineModalOpen(true);
  };

  const confirmBatchOffline = () => {
    if (!offlineReason.trim()) {
      message.warning('请填写下架原因');
      return;
    }
    const ids = offlineRecord.ids;
    setDataSource(prev => prev.map(r => ids.includes(r.id) ? { ...r, status: '已下架' } : r));
    message.success(`已批量下架 ${ids.length} 条，已通知发布者 (BR-042)`);
    setOfflineModalOpen(false);
    setSelectedRowKeys([]);
  };

  const handleBatchDelete = () => {
    if (selectedRowKeys.length > 50) {
      message.warning('单次批量操作不超过50条 (BR-044)');
      return;
    }
    Modal.confirm({
      title: '批量删除确认',
      icon: React.createElement('i', {className:"ti ti-alert-circle", style:{fontSize:18}}),
      content: `确认删除 ${selectedRowKeys.length} 条内容？数据保留180天 (BR-043软删除)`,
      okText: '确认删除',
      okType: 'danger',
      cancelText: '取消',
      onOk() {
        setDataSource(prev => prev.filter(r => !selectedRowKeys.includes(r.id)));
        setSelectedRowKeys([]);
        message.success('已批量删除');
      }
    });
  };

  const handlePin = (record) => {
    var willPin = !record.pinned;
    setDataSource(prev => prev.map(r => r.id === record.id ? { ...r, pinned: willPin } : r));
    if (willPin) {
      message.success('已置顶，置顶项始终显示在列表最上方');
    } else {
      message.success('已取消置顶');
    }
  };

  const handleEdit = (record) => {
    setEditRecord({ ...record });
    setEditModalOpen(true);
  };

  const handleSaveEdit = () => {
    var r = editRecord;
    if (!r.title || !r.title.trim()) {
      message.warning('标题不能为空');
      return;
    }
    setDataSource(prev => prev.map(d => d.id === r.id ? { ...d,
      title: r.title, type: r.type, publisher: r.publisher, status: r.status,
      time: r.time, pinned: r.pinned, description: r.description,
      category: r.category, industry: r.industry, tags: r.tags, urgency: r.urgency
    } : d));
    message.success('编辑已保存');
    setEditModalOpen(false);
    setEditRecord(null);
  };

  const getMenuItems = (record) => {
    const items = [
      { key: 'view', label: '查看', icon: React.createElement('i', {className:"ti ti-eye", style:{fontSize:18}}) },
      { key: 'edit', label: '编辑', icon: React.createElement('i', {className:"ti ti-edit", style:{fontSize:18}}) },
      { key: 'pin', label: record.pinned ? '取消置顶' : '置顶', icon: React.createElement('i', {className:"ti ti-pinned", style:{fontSize:18}}) },
      { key: 'offline', label: '下架', icon: React.createElement('i', {className:"ti ti-ban", style:{fontSize:18}}), disabled: record.status !== '已发布' },
      { key: 'delete', label: '删除', icon: React.createElement('i', {className:"ti ti-trash", style:{fontSize:18}}), danger: true },
    ];
    return items;
  };

  const onMenuClick = (key, record) => {
    if (key === 'view') handleView(record);
    else if (key === 'edit') handleEdit(record);
    else if (key === 'pin') handlePin(record);
    else if (key === 'offline') handleOffline(record);
    else if (key === 'delete') handleDelete(record);
  };

  const columns = [
    {
      title: '排序', dataIndex: 'sort', key: 'sort', width: 100, align: 'center',
      render: function(val, record) {
        // 找出当前 filteredData 中同类项按 sort 排序后的位置
        var sameType = filteredData.filter(function(r) { return r.type === segType; });
        sameType.sort(function(a, b) { return a.sort - b.sort; });
        var pinnedGroup = sameType.filter(function(r) { return r.pinned; });
        var unpinnedGroup = sameType.filter(function(r) { return !r.pinned; });
        var allSorted = pinnedGroup.concat(unpinnedGroup);
        var idx = allSorted.findIndex(function(r) { return r.id === record.id; });
        var isFirst = idx <= 0;
        var isLast = idx >= allSorted.length - 1;
        return React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2 } },
          React.createElement('span', { style: { fontSize: 12, color: '#8c8c8c', minWidth: 20, textAlign: 'center' } }, val),
          React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 0 } },
            React.createElement(Button, {

        React.createElement('div', { style: { padding: '10px 14px', background: '#f6ffed', border: '1px solid #b7eb8f', borderRadius: 6 } },
          React.createElement(Checkbox, {
            checked: proxyNotify,
            onChange: function(e) { setProxyNotify(e.target.checked); }
          },
            React.createElement('span', { style: { fontWeight: 500 } }, '同步发送邮件通知订阅用户')
          ),
          React.createElement('div', { style: { fontSize: 11, color: '#8c8c8c', marginLeft: 24, marginTop: 4 } }, '勾选后，方案发布时将自动向所有订阅该类目的用户发送邮件通知')
        )
      )
    )
  );
}
