// 高亮文本中的 @mention
function highlightMentions(text) {
  if (!text) return text;
  var parts = text.split(/(@\S+)/g);
  return parts.map(function(part, i) {
    if (part.charAt(0) === '@' && MENTION_USERS.some(function(u) { return '@'+u.name === part; })) {
      return React.createElement('span', { key: i, className: 'mention-highlight' }, part);
    }
    return part;
  });
}

// @提及输入框组件（含下拉建议）
function MentionTextArea(props) {
  var textareaProps = Object.assign({}, props);
  delete textareaProps.onMentionUsers; // internal, not for TextArea

  var [showDropdown, setShowDropdown] = React.useState(false);
  var [mentionQuery, setMentionQuery] = React.useState('');
  var [dropdownPos, setDropdownPos] = React.useState({ top:0, left:0 });
  var textareaRef = React.useRef(null);
  var containerRef = React.useRef(null);

  var handleChange = function(e) {
    var value = e.target.value;
    var cursorPos = e.target.selectionStart || 0;
    if (props.onChange) props.onChange(e);

    // 检测 @ 符号：找到光标前最近的 @
    var textBeforeCursor = value.substring(0, cursorPos);
    var lastAtIndex = textBeforeCursor.lastIndexOf('@');
    if (lastAtIndex >= 0 && (lastAtIndex === 0 || textBeforeCursor.charAt(lastAtIndex - 1) === ' ' || textBeforeCursor.charAt(lastAtIndex - 1) === '\n')) {
      var query = textBeforeCursor.substring(lastAtIndex + 1);
      // query 不能包含空格
      if (query.indexOf(' ') < 0 && query.indexOf('\n') < 0) {
        setMentionQuery(query);
        setShowDropdown(true);
        // 计算下拉位置
        if (containerRef.current) {
          var rect = containerRef.current.getBoundingClientRect();
          setDropdownPos({ top: rect.bottom + window.scrollY + 4, left: rect.left + 12 });
        }
        return;
      }
    }
    setShowDropdown(false);
    setMentionQuery('');
  };

  var handleSelectUser = function(user) {
    var value = props.value || '';
    var cursorPos = (textareaRef.current && textareaRef.current.resizableTextArea && textareaRef.current.resizableTextArea.textArea)
      ? (textareaRef.current.resizableTextArea.textArea.selectionStart || value.length)
      : value.length;
    var textBeforeCursor = value.substring(0, cursorPos);
    var lastAtIndex = textBeforeCursor.lastIndexOf('@');
    var beforeAt = textBeforeCursor.substring(0, lastAtIndex);
    var afterCursor = value.substring(cursorPos);
    var newValue = beforeAt + '@' + user.name + ' ' + afterCursor;

    // Trigger synthetic change
    if (props.onChange) {
      props.onChange({ target: { value: newValue } });
    }
    setShowDropdown(false);
    setMentionQuery('');
    // Refocus
    setTimeout(function() {
      if (textareaRef.current && textareaRef.current.resizableTextArea && textareaRef.current.resizableTextArea.textArea) {
        var ta = textareaRef.current.resizableTextArea.textArea;
        var newPos = beforeAt.length + user.name.length + 2; // after '@name '
        ta.focus();
        ta.setSelectionRange(newPos, newPos);
      }
    }, 50);
  };

  var filteredUsers = MENTION_USERS.filter(function(u) {
    return !mentionQuery || u.name.toLowerCase().indexOf(mentionQuery.toLowerCase()) >= 0;
  });

  return React.createElement('div', { ref: containerRef, style: { position:'relative', flex: props.style && props.style.flex ? props.style.flex : 'auto' } },
    React.createElement(TextArea, Object.assign({}, textareaProps, {
      ref: function(el) { textareaRef.current = el; if (typeof props.ref === 'function') props.ref(el); },
      onChange: handleChange
    })),
    showDropdown && filteredUsers.length > 0 && React.createElement('div', {
      className: 'mention-dropdown',
      style: { position:'fixed', top: dropdownPos.top, left: dropdownPos.left }
    },
      filteredUsers.map(function(user, i) {
        return React.createElement('div', {
          key: user.name,
          className: 'mention-item',
          onClick: function() { handleSelectUser(user); }
        },
          React.createElement('div', { className: 'ment-avatar', style: { background: MENTION_COLORS[i % MENTION_COLORS.length] } }, user.name.charAt(0)),
          React.createElement('div', null,
            React.createElement('div', { style: { fontWeight:500 } }, user.name),
            React.createElement('div', { style: { fontSize:11, color:'#bfbfbf' } }, user.dept)
          )
        );
      })
    )
  );
}

// 递归辅助：在评论树中查找并添加回复
// 在评论列表中查找并添加回复（仅2级扁平）
function addReplyToComment(comments, parentId, newReply) {
  return comments.map(c => {
    if (c.id === parentId) {
      return { ...c, replies: [...(c.replies || []), newReply] };
    }
    return c;
  });
}

// 从评论或回复列表中删除指定项
function removeById(comments, targetId) {
  return comments
    .filter(c => c.id !== targetId)
    .map(c => {
      if (c.replies && c.replies.length > 0) {
        return { ...c, replies: c.replies.filter(r => r.id !== targetId) };
      }
      return c;
    });
}

// 统计评论总数（顶级+回复）
function countAll(comments) {
  let n = comments.length;
  comments.forEach(c => { if (c.replies) n += c.replies.length; });
  return n;
}

// 截止日期倒计时
const DeadlineCountdown = ({ deadline }) => {
  var diff = dayjs(deadline).diff(dayjs(), 'hour');
  if (diff <= 0) return React.createElement(Tag, { color: 'red' }, '已超期');
  if (diff <= 24) return React.createElement(Tag, { color: 'red' }, '剩余 ' + diff + ' 小时');
  return React.createElement(Tag, { color: 'orange' }, '剩余 ' + Math.ceil(diff/24) + ' 天');
};

  return (

      <div style={{ display:'flex', gap:12 }}>
        <div className="cmt-avatar" style={{ background: AVATAR_COLORS[index % AVATAR_COLORS.length] }}>

            <Tag style={{ borderRadius:6, fontSize:10, color:'#8c8c8c', background:'#f5f5f5', border:'none', margin:0, padding:'0 6px', lineHeight:'18px' }}>{comment.dept}</Tag>
            <span style={{ fontSize:12, color:'#bfbfbf', marginLeft:'auto' }}>{comment.time}</span>
          </div>
          <div style={{ fontSize:14, color:'#444', lineHeight:1.75, marginBottom:8 }}>{highlightMentions(comment.content)}</div>
          <div style={{ display:'flex', alignItems:'center', gap:16 }}>
            <button className="cmt-action" onClick={() => setReplyOpen(!replyOpen)}>
              {TablerIcon({icon:'message'})} 回复
            </button>
            {isMine && <button className='cmt-action danger' onClick={handleDel}>
              {TablerIcon({icon:'trash'})} 删除
            </button>}
          </div>
        </div>
      </div>
      {replyOpen && (
        <div style={{ marginTop:10, marginLeft:48, display:'flex', gap:8 }}>
          <MentionTextArea
            rows={2} value={replyText}
            onChange={function(e) { setReplyText(e.target.value); }}
            placeholder={'回复 ' + comment.author + '...'}
            maxLength={500}
            style={{ borderRadius:8, resize:'none', flex:1, fontSize:13 }}
          />
          <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
            <Button type="primary" size="small" onClick={handleReply} style={{ borderRadius:8 }}>发送</Button>
            <Button size="small" onClick={function() { setReplyOpen(false); setReplyText(''); }} style={{ borderRadius:8 }}>取消</Button>
          </div>
        </div>
      )}
      {replies.length > 0 && (
        <div style={{ marginLeft:48, marginTop:8 }}>
          {replies.map(function(r, ri) {
            return (
              <div key={r.id} className="comment-reply-item" style={{ borderLeftColor: r.isMine ? '#b7eb8f' : '#e8e8e8' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
                  <span style={{ fontSize:13, fontWeight:600, color:'#555' }}>{r.author}</span>
                  <Tag style={{ borderRadius:6, fontSize:10, color:'#8c8c8c', background:'#f5f5f5', border:'none', margin:0, padding:'0 5px', lineHeight:'16px' }}>{r.dept}</Tag>
                  <span style={{ fontSize:11, color:'#bfbfbf', marginLeft:'auto' }}>{r.time}</span>

                <div style={{ fontSize:13, color:'#555', lineHeight:1.65 }}>{highlightMentions(r.content)}</div>
                <div style={{ display:'flex', gap:12, marginTop:4 }}>
                  <button className="cmt-action" onClick={() => setReplyOpen(!replyOpen)}>
                    {TablerIcon({icon:'message', style:{fontSize:13}})} 回复
                  </button>
                  {r.isMine && <button className='cmt-action danger' onClick={() => handleDelReply(r.id)}>
                    {TablerIcon({icon:'trash', style:{fontSize:13}})} 删除

                </div>

            );

      )}

  );
};
