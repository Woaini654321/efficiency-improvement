* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
.page-container { padding: 4px 0 40px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-header-title { font-size: 20px; font-weight: 700; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.task-card { background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 14px; border: 1px solid #f0f0f0; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); position: relative; }

.task-card.overdue { border-left: 3px solid #ff4d4f; }
.task-card.transferred-card { border-left: 3px solid #722ed1; }
.task-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.task-card-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; font-size: 12px; color: #8c8c8c; }
.task-card-meta i { font-size: 14px; margin-right: 3px; }
.task-card-desc { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 14px; }
.task-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid #f5f5f5; }
.task-card-tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.task-card-actions { display: flex; gap: 8px; }
.transfer-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f9f0ff; border: 1px solid #d3adf7; border-radius: 6px; font-size: 12px; color: #722ed1; margin-bottom: 8px; }
.empty-state { text-align: center; padding: 80px 0; }
@keyframes overdueBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.overdue-blink { animation: overdueBlink 1s ease-in-out infinite; }
@media(max-width:768px){
  .page-container { padding: 12px; }
  .task-card { padding: 16px; }
  .task-card-footer { flex-direction: column; gap: 10px; align-items: flex-start; }
  .task-card-actions { width: 100%; justify-content: flex-end; }
