    ];

    const TYPE_COLORS = { product_info:'blue', solution:'green', success_case:'orange' };
    const TYPE_LABELS = { product_info:'产品信息', solution:'解决方案', success_case:'成功案例' };
    const AVATAR_COLORS = ['#f56a00','#7265e6','#ffbf00','#00a2ae','#87d068','#1890ff','#eb2f96','#722ed1'];

    function formatCount(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }

    function FileIcon({ type }) {
      if (type === 'pdf') return <i className="ti ti-file-type-pdf" style={{fontSize:32, color:'#ff4d4f'}} />;
      if (type === 'pptx') return <i className="ti ti-file-type-ppt" style={{fontSize:32, color:'#fa8c16'}} />;
      return <i className="ti ti-file-text" style={{fontSize:32, color:'#1890ff'}} />;
    }

    // 在评论列表中查找并添加回复（仅2级扁平）
    function addReplyToComment(comments, parentId, newReply) {
      return comments.map(c => {
        if (c.id === parentId) {
          return { ...c, replies: [...(c.replies || []), newReply] };
        }
        return c;
      });
    }

    // 从评论或回复列表中删除指定项
    function removeById(comments, targetId) {
      return comments
        .filter(c => c.id !== targetId)
        .map(c => {
          if (c.replies && c.replies.length > 0) {
            return { ...c, replies: c.replies.filter(r => r.id !== targetId) };
          }
          return c;
        });
    }

    // 统计评论总数（顶级+回复）
    function countAll(comments) {
      let n = comments.length;
      comments.forEach(c => { if (c.replies) n += c.replies.length; });
      return n;
    }

    // 微信公众号风格评论卡片 - 仅两级：顶级评论 + 扁平回复
    function CommentCard({ comment, index, currentUser, onReply, onDelete }) {
      const [replyOpen, setReplyOpen] = React.useState(false);
      const [replyText, setReplyText] = React.useState('');
      const [cLikes, setCLikes] = React.useState(comment.likes || 0);
      const [cLiked, setCLiked] = React.useState(false);
      const replies = comment.replies || [];
      const isMine = comment.isMine || false;

      const handleReply = () => {
        if (!replyText.trim()) return;
        const newReply = {
          id: Date.now(),
          user: currentUser.name,
          dept: currentUser.dept,
          time: '刚刚',
          content: replyText,
          isMine: true,
        };
        onReply(comment.id, newReply);
        setReplyText('');
        setReplyOpen(false);
        message.success('回复成功');
      };

      const handleDelete = () => {
        Modal.confirm({
          title: '删除评论',
          content: '确认删除此评论？删除后不可恢复。',
          okText: '确认删除',
          cancelText: '取消',
          okButtonProps: { danger: true },
          onOk: () => {
            onDelete(comment.id);
            message.success('评论已删除');
          }
        });
      };

      const handleDelReply = function(rid) { Modal.confirm({ title: '删除回复', content: '确认删除此回复？', okText: '确认删除', cancelText: '取消', okButtonProps: { danger: true }, onOk: function() { onDelete(rid); message.success('回复已删除'); } }); };
      return (
        <div style={{ animationDelay: (index*0.04)+'s', animation:'slideUp 0.35s ease both' }}>
          <div className={'comment-card'} style={{}}>
            {/* 删除按钮（仅自己的评论可见） */}
            {isMine && (
              <Tooltip title="删除">
                <button className="cmt-action danger" onClick={handleDelete} style={{ position:'absolute', top:12, right:14 }}>
                  <i className="ti ti-trash" style={{fontSize:16}} />
                </button>
              </Tooltip>
            )}
            <div style={{ display:'flex', gap:10 }}>
              <div style={{ width: 36, height: 36, borderRadius:'50%', background:AVATAR_COLORS[index % AVATAR_COLORS.length], display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize: 13, fontWeight:600, flexShrink:0 }}>

              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>

                  <button className="cmt-action" onClick={() => setReplyOpen(!replyOpen)}>
                    <i className="ti ti-message" style={{fontSize:16}} /> 回复

              </div>

            <div style={{ marginLeft: 48, marginTop: 8 }}>

                return (
                  <div key={r.id} style={{ padding: "10px 14px", marginBottom: 4, background: "#f9fafb", borderRadius: 8, borderLeft: "3px solid #e8e8e8", fontSize: 13, lineHeight: 1.7 }}>

    function DetailPage() {

      const toggleLike = () => { setLiked(!liked); setLikeNum(prev => liked ? prev-1 : prev+1); message.success(liked ? '已取消点赞' : '已点赞'); };

      const toggleFollow = () => {
        var newFollowed = !followed;
        setFollowed(newFollowed);
        try {
          var followed = JSON.parse(localStorage.getItem('followed_items') || '[]');
          var idx = followed.indexOf(OPP.id);
          if (newFollowed && idx < 0) followed.push(OPP.id);
          else if (!newFollowed && idx >= 0) followed.splice(idx, 1);
          localStorage.setItem('followed_items', JSON.stringify(followed));
        } catch(e) {}
        message.success(newFollowed ? '已关注，该方案更新时将通知你' : '已取消关注');
      };
