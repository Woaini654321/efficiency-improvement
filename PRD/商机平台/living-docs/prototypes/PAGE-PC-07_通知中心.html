<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>通知中心 - Quectel商机互助平台</title>
<script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
<script crossorigin="anonymous" src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/antd@5/dist/antd.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="prototype-shell.js"></script>
<script src="data-tracker.js"></script>
<style>
  body { margin: 0; background: #f5f5f5; }
  .notify-page { max-width: 960px; margin: 0 auto; padding: 24px; }
  .notify-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .notify-header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .notify-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .notify-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-radius: 8px 8px 0 0; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; gap: 8px; }
  .notify-toolbar-left { display: flex; align-items: center; gap: 8px; }
  .notify-toolbar-right { display: flex; align-items: center; gap: 8px; }
  .time-section { margin-bottom: 0; }
  .time-section-header { display: flex; align-items: center; padding: 14px 20px 8px; font-size: 13px; font-weight: 600; color: #8c8c8c; text-transform: none; letter-spacing: 0; }
  .time-section-header::after { content: ''; flex: 1; height: 1px; background: #f0f0f0; margin-left: 12px; }
  .notify-row { display: flex; align-items: flex-start; padding: 14px 20px; background: #fff; border-bottom: 1px solid #fafafa; cursor: pointer; transition: background 0.15s; position: relative; }
  .notify-row:hover { background: #fafbfd; }
  .notify-row:last-child { border-bottom: none; }
  .notify-row.expanded { background: #f6f8fb; }
  .notify-row-select { display: flex; align-items: center; margin-right: 10px; flex-shrink: 0; padding-top: 1px; }
  .notify-row-select .ant-checkbox-wrapper { display: none; }
  .notify-row:hover .notify-row-select .ant-checkbox-wrapper,
  .notify-row.selected .notify-row-select .ant-checkbox-wrapper,
  .show-checkboxes .notify-row-select .ant-checkbox-wrapper { display: inline-flex; }
  .notify-dot-wrap { display: flex; align-items: center; margin-right: 10px; flex-shrink: 0; padding-top: 3px; }
  .notify-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .notify-dot.unread { background: #ff4d4f; box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  .notify-dot.read { background: #d9d9d9; }
  .notify-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; font-size: 18px; }
  .notify-icon.publish { background: #e6f7ff; color: #1890ff; }
  .notify-icon.response { background: #f6ffed; color: #52c41a; }
  .notify-icon.adopt { background: #fff7e6; color: #fa8c16; }
  .notify-icon.system { background: #f5f5f5; color: #8c8c8c; }
  .notify-icon.mention { background: #f9f0ff; color: #722ed1; }
  .notify-icon.subscribe { background: #e6fffb; color: #13c2c2; }
  .notify-body { flex: 1; min-width: 0; }
  .notify-title { font-size: 14px; color: #262626; line-height: 1.5; }
  .notify-title .highlight { color: #1890ff; font-weight: 500; }
  .notify-desc { font-size: 12px; color: #8c8c8c; margin-top: 2px; }
  .notify-meta { font-size: 12px; color: #bfbfbf; margin-top: 2px; }
  .notify-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
  .notify-expand-body { padding: 0 20px 16px 84px; background: #fff; border-bottom: 1px solid #fafafa; display: none; }
  .notify-row:last-child + .notify-expand-body { border-bottom: none; }
  .notify-expand-body.show { display: block; }
  .notify-expand-card { background: #fafafa; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #595959; line-height: 1.8; }
  .batch-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 8px; margin-bottom: 12px; }
  .page-footer { display: flex; justify-content: flex-end; margin-top: 16px; }
  .empty-state { padding: 64px 0; text-align: center; color: #bfbfbf; }
  .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.5; }
  .pref-link { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; font-size: 12px; color: #1890ff; padding: 4px 8px; border-radius: 4px; transition: background 0.2s; }
  .pref-link:hover { background: #e6f7ff; }

  /* 响应式 */
  @media(max-width:768px){
    .notify-page{padding:0!important;max-width:100%!important;}
    .notify-header{flex-direction:column!important;align-items:flex-start!important;gap:12px!important;margin-bottom:16px!important;}
    .notify-header-left{width:100%!important;}
    .notify-header-right{width:100%!important;overflow-x:auto!important;}
    .notify-toolbar{flex-direction:column!important;gap:10px!important;margin-bottom:12px!important;padding:12px!important;border-radius:12px!important;}
    .notify-toolbar-left,.notify-toolbar-right{width:100%!important;}
    .notify-toolbar-left input{width:100%!important;}
    .notify-toolbar-left .ant-select{width:100%!important;}
    .ant-modal{max-width:100vw!important;margin:0!important;top:0!important;}
    .ant-modal-content{border-radius:0!important;min-height:100vh!important;}
  }
  @media(max-width:600px){
    .notify-row{padding:12px 12px!important;border-radius:10px!important;}
    .notify-expand-body{padding:0 12px 14px 16px!important;}
    .notify-expand-card{padding:12px!important;border-radius:8px!important;}
    .notify-icon{width:36px!important;height:36px!important;font-size:15px!important;border-radius:8px!important;}
    .notify-body{font-size:13px!important;}
    .notify-right{font-size:11px!important;}
    .time-section-header{padding:8px 0!important;font-size:13px!important;}
    .time-section{margin-bottom:16px!important;}
    .batch-bar{flex-direction:column!important;gap:8px!important;align-items:flex-start!important;padding:10px 12px!important;border-radius:8px!important;}
    .page-footer{margin-top:12px!important;}
  }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;
const {
  Badge, Segmented, Select, Button, Tag, Pagination, Modal, Checkbox, Switch,
  message, Typography, Space, Card, Input, Skeleton, Tooltip, Dropdown, Empty
} = antd;
const { Search } = Input;

/* ===== 通知类型配置 ===== */
const NOTIFY_TYPE_MAP = {
  publish:   { label: '方案发布', color: 'blue',   icon: 'ti-file-text',    iconClass: 'publish' },
  response:  { label: '需求响应', color: 'green',  icon: 'ti-messages',    iconClass: 'response' },
  adopt:     { label: '方案采纳', color: 'orange', icon: 'ti-award',        iconClass: 'adopt' },
  system:    { label: '系统通知', color: 'default',icon: 'ti-info-circle',  iconClass: 'system' },
  mention:   { label: '@提及',   color: 'purple', icon: 'ti-at',           iconClass: 'mention' },
  subscribe: { label: '订阅更新', color: 'cyan',   icon: 'ti-bell-ringing',iconClass: 'subscribe' },
};

/* ===== Mock 通知数据（22条，跨多天） ===== */
function buildMockData() {
  const now = dayjs();
  const authors = ['Tony.Zhang 张伟', 'Nina.Li 李娜', 'Kevin.Wang 王强', 'Yan.Chen 陈燕', 'Leo.Zhao 赵磊', 'Owen.Liu 刘洋', 'Ivy.Sun 孙芳', 'Ming.Zhou 周明', '系统'];
  const samples = [
    { type: 'publish',   titles: ['《{0}》方案已发布', '产品经理{0}发布了新方案《{1}》', '《{1}》v2.0 版本已上线'] },
    { type: 'response',  titles: ['你的需求"{1}"收到{0}的响应', '{0}响应了你的需求', '需求"{1}"新增{1}条方案建议'] },
    { type: 'adopt',     titles: ['{0}将你的方案标记为"最佳方案"', '你的方案被{0}采纳', '恭喜！{1}个方案被销售团队采纳'] },
    { type: 'system',    titles: ['SLA告警：需求"{1}"即将超时', '平台将于{0}进行维护升级', '月度报告：{1}月方案采纳率统计已生成'] },
    { type: 'mention',   titles: ['{0}在评论中@了你', '{0}在方案《{1}》讨论中提及你', '{0}回复了你的评论'] },
    { type: 'subscribe', titles: ['你订阅的"{1}"分类有新方案', '订阅分类《{1}》更新了{1}篇内容', '关注方案《{1}》有更新'] },
  ];
  const productNames = ['5G模组选型指南', 'NB-IoT低功耗方案', '智慧城市解决方案', '车联网安全方案', '工业物联网平台',
    '边缘计算网关', '多模通信模组', '智慧农业方案', '远程医疗终端', '智能电表方案',
    'LTE Cat.1 模组', 'GNSS 定位模组', '智能家居中控', 'WiFi6 路由方案', '车载通信终端'];
  const reqNames = ['智慧城市方案', '车联网方案', '工业物联网', '5G基站配套', '智能表计需求',
    '冷链物流追踪', '环境监测终端', '充电桩通信', '智能井盖方案', '智慧路灯方案'];

  const data = [];
  let id = 1;

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // 今天：7条
  for (let i = 0; i < 7; i++) {
    const type = ['publish','response','mention','subscribe','system','response','publish'][i];
    const sample = samples.find(s => s.type === type);
    const titleTmpl = pick(sample.titles);
    const author = pick(authors);
    const prod = pick(productNames);
    const req = pick(reqNames);
    data.push({
      id: id++, read: i >= 2, type, forced: type === 'system' && i === 4,
      title: titleTmpl.replace('{0}', author).replace('{1}', type === 'publish' ? prod : req),
      author, time: now.subtract(i * 25 + Math.floor(Math.random() * 60), 'minute'),
      targetType: type === 'publish' || type === 'subscribe' ? 'Opportunity'
        : (type === 'response' || type === 'mention' ? 'Request' : 'System'),
      targetId: 'OPP-' + String(1000 + Math.floor(Math.random() * 100)),
      detail: `由 ${author} 发起，涉及${type === 'publish' ? '方案' : '需求'}：${type === 'publish' ? prod : req}。请及时查看并处理。`
    });
  }

  // 昨天：5条
  for (let i = 0; i < 5; i++) {
    const type = ['publish','adopt','system','mention','response'][i];
    const sample = samples.find(s => s.type === type);
    const titleTmpl = pick(sample.titles);
    const author = pick(authors);
    const prod = pick(productNames);
    const req = pick(reqNames);
    data.push({
      id: id++, read: true, type,
      title: titleTmpl.replace('{0}', author).replace('{1}', type === 'publish' ? prod : req),
      author, time: now.subtract(1, 'day').subtract(i * 3 + Math.floor(Math.random() * 13), 'hour'),
      targetType: type === 'publish' ? 'Opportunity' : (type === 'response' || type === 'mention' ? 'Request' : 'System'),
      targetId: 'OPP-' + String(1000 + Math.floor(Math.random() * 100)),
      detail: `由 ${author} 发起。请查看详情。`
    });
  }

  // 本周：6条
  for (let i = 0; i < 6; i++) {
    const type = ['publish','adopt','system','subscribe','response','mention'][i];
    const sample = samples.find(s => s.type === type);
    const titleTmpl = pick(sample.titles);
    const author = pick(authors);
    const prod = pick(productNames);
    const req = pick(reqNames);
    data.push({
      id: id++, read: true, type,
      title: titleTmpl.replace('{0}', author).replace('{1}', type === 'publish' ? prod : req),
      author, time: now.subtract(2 + i, 'day').add(Math.floor(Math.random() * 12), 'hour'),
      targetType: type === 'publish' || type === 'subscribe' ? 'Opportunity' : 'System',
      targetId: 'REQ-' + String(2000 + Math.floor(Math.random() * 100)),
      detail: `由 ${author} 发起。`
    });
  }

  // 更早：4条
  for (let i = 0; i < 4; i++) {
    const type = ['system','publish','adopt','subscribe'][i];
    const sample = samples.find(s => s.type === type);
    const titleTmpl = pick(sample.titles);
    const author = pick(authors);
    const prod = pick(productNames);
    data.push({
      id: id++, read: true, type,
      title: titleTmpl.replace('{0}', author).replace('{1}', prod),
      author, time: now.subtract(8 + i * 5, 'day').add(Math.floor(Math.random() * 48), 'hour'),
      targetType: 'System',
      targetId: null,
      detail: `历史通知。由 ${author} 发起。`
    });
  }

  return data;
}

/* ===== 时间分组工具 ===== */
function getTimeGroup(t) {
  const now = dayjs();
  const diffDays = now.diff(t, 'day');
  if (diffDays === 0) return 'today';
  if (diffDays === 1) return 'yesterday';
  if (diffDays < 7) return 'week';
  return 'older';
}

const TIME_GROUP_LABELS = { today: '今天', yesterday: '昨天', week: '本周', older: '更早' };
const TIME_GROUP_ORDER = ['today', 'yesterday', 'week', 'older'];

function groupByTime(list) {
  const groups = { today: [], yesterday: [], week: [], older: [] };
  list.forEach(item => {
    const g = getTimeGroup(item.time);
    groups[g].push(item);
  });
  return TIME_GROUP_ORDER.filter(k => groups[k].length > 0);
}

function formatRelativeTime(t) {
  const diff = dayjs().diff(t, 'minute');
  if (diff < 1) return '刚刚';
  if (diff < 60) return diff + ' 分钟前';
  const hours = dayjs().diff(t, 'hour');
  if (hours < 24) return hours + ' 小时前';
  const days = dayjs().diff(t, 'day');
  if (days < 7) return days + ' 天前';
  return t.format('MM-DD HH:mm');
}

/* ===== 主组件 ===== */
function NotifyCenter() {
  const [data, setData] = useState(function() {
    var mockData = buildMockData();
    // 从 localStorage 读取外部写入的通知（如 PC-05 采纳方案时写入）
    try {
      var stored = JSON.parse(localStorage.getItem('pc07_notifications') || '[]');
      var parsed = stored.map(function(n) { return Object.assign({}, n, { time: dayjs(n.time) }); });
      return parsed.concat(mockData);
    } catch(e) {
      return mockData;
    }
  });
  const [loading, setLoading] = useState(true);
  const [readFilter, setReadFilter] = useState('all');
  const [unreadOnly, setUnreadOnly] = useState(false);
  const [typeFilter, setTypeFilter] = useState(null);
  const [searchKey, setSearchKey] = useState('');
  const [currentPage, setCurrentPage] = useState(1);
  const [modalVisible, setModalVisible] = useState(false);
  const [modalItem, setModalItem] = useState(null);
  const [checked, setChecked] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [expandedId, setExpandedId] = useState(null);
  const [batchMode, setBatchMode] = useState(false);
  const pageSize = 8;

  // 骨架屏加载
  useEffect(() => {
    const timer = setTimeout(() => setLoading(false), 600);
    return () => clearTimeout(timer);
  }, []);

  // 更新 shell 通知计数
  useEffect(() => {
    const unread = data.filter(d => !d.read).length;
    try { window.__updateNotifyBadge && window.__updateNotifyBadge(unread); } catch(e) {}
  }, [data]);

  const unreadCount = data.filter(d => !d.read).length;
  const totalCount = data.length;

  /* ===== 筛选 + 搜索 ===== */
  const filtered = useMemo(() => {
    let list = [...data];
    if (readFilter === 'unread') list = list.filter(d => !d.read);
    if (readFilter === 'read') list = list.filter(d => d.read);
    if (typeFilter) list = list.filter(d => d.type === typeFilter);
    if (searchKey.trim()) {
      const kw = searchKey.trim().toLowerCase();
      list = list.filter(d =>
        d.title.toLowerCase().indexOf(kw) >= 0 ||
        d.author.toLowerCase().indexOf(kw) >= 0
      );
    }
    // 按时间倒序
    list.sort((a, b) => b.time.valueOf() - a.time.valueOf());
    return list;
  }, [data, readFilter, typeFilter, searchKey]);

  const paged = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);
  const activeGroups = groupByTime(paged);

  /* ===== 操作函数 ===== */
  const markAllRead = () => {
    const forcedUnread = data.some(d => d.forced && !d.read);
    setData(prev => prev.map(d => (d.forced && !d.read) ? d : { ...d, read: true }));
    message.success(forcedUnread ? '已标记已读（强制确认通知除外）' : '已全部标记已读');
  };

  const clearRead = () => {
    const readCount = data.filter(d => d.read).length;
    if (readCount === 0) { message.info('没有已读通知可清空'); return; }
    Modal.confirm({
      title: '清空已读通知',
      content: `确定要清空全部 ${readCount} 条已读通知吗？此操作不可撤销。`,
      okText: '确定清空',
      cancelText: '取消',
      okType: 'danger',
      onOk: () => {
        setData(prev => prev.filter(d => !d.read));
        setSelectedIds([]);
        message.success(`已清空 ${readCount} 条通知`);
      }
    });
  };

  const deleteSelected = () => {
    if (selectedIds.length === 0) { message.info('请先选择通知'); return; }
    setData(prev => prev.filter(d => !selectedIds.includes(d.id)));
    message.success(`已删除 ${selectedIds.length} 条通知`);
    setSelectedIds([]);
    setBatchMode(false);
  };

  const markSelectedRead = () => {
    if (selectedIds.length === 0) { message.info('请先选择通知'); return; }
    setData(prev => prev.map(d => selectedIds.includes(d.id) ? { ...d, read: true } : d));
    message.success(`已标记 ${selectedIds.length} 条为已读`);
    setSelectedIds([]);
    setBatchMode(false);
  };

  const toggleSelect = (id) => {
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const selectAllCurrent = () => {
    const currentIds = paged.map(d => d.id);
    const allSelected = currentIds.every(id => selectedIds.includes(id));
    if (allSelected) {
      setSelectedIds(prev => prev.filter(id => !currentIds.includes(id)));
    } else {
      setSelectedIds(prev => [...new Set([...prev, ...currentIds])]);
    }
  };

  const handleRowClick = (item) => {
    // 批量模式下不触发行点击
    if (batchMode) return;

    // 展开/折叠
    if (expandedId === item.id) {
      setExpandedId(null);
      return;
    }
    setExpandedId(item.id);

    // 强制确认
    if (item.forced && !item.read) {
      setModalItem(item);
      setChecked(false);
      setModalVisible(true);
      return;
    }

    // 标记已读
    setData(prev => prev.map(d => d.id === item.id ? { ...d, read: true } : d));

    // 非强制通知，点击跳转
    if (item.targetType === 'Opportunity') {
      setTimeout(() => { window.location.href = 'PAGE-PC-02_商机详情页.html'; }, 300);
    } else if (item.targetType === 'Request') {
      setTimeout(() => { window.location.href = 'PAGE-PC-05_需求详情页.html'; }, 300);
    }
  };

  const handleModalConfirm = () => {
    if (!modalItem) return;
    setData(prev => prev.map(d => d.id === modalItem.id ? { ...d, read: true } : d));
    setModalVisible(false);
    setModalItem(null);
    message.success('已确认阅读');
  };

  /* ===== 渲染骨架屏 ===== */
  const renderSkeleton = () => (
    <div style={{ background: '#fff', borderRadius: 8, boxShadow: '0 1px 2px rgba(0,0,0,0.06)', padding: 16 }}>
      {[1,2,3,4,5,6].map(i => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', padding: '12px 0', borderBottom: i < 6 ? '1px solid #f5f5f5' : 'none', gap: 12 }}>
          <Skeleton.Avatar active size={8} shape="circle" />
          <Skeleton.Avatar active size={36} shape="square" style={{ borderRadius: 8 }} />
          <div style={{ flex: 1 }}>
            <Skeleton.Input active size="small" style={{ width: '60%', height: 16 }} />
            <div style={{ marginTop: 4 }}>
              <Skeleton.Input active size="small" style={{ width: '30%', height: 12 }} />
            </div>
          </div>
          <Skeleton.Button active size="small" style={{ width: 60 }} />
        </div>
      ))}
    </div>
  );

  /* ===== 渲染单条通知 ===== */
  const renderNotifyRow = (item) => {
    const typeInfo = NOTIFY_TYPE_MAP[item.type] || NOTIFY_TYPE_MAP.system;
    const isExpanded = expandedId === item.id;
    const isSelected = selectedIds.includes(item.id);

    return (
      <React.Fragment key={item.id}>
        <div
          className={'notify-row' + (isExpanded ? ' expanded' : '') + (isSelected ? ' selected' : '') + (batchMode ? ' show-checkboxes' : '')}
          onClick={() => handleRowClick(item)}
        >
          {/* 选择框 */}
          <div className="notify-row-select" onClick={e => e.stopPropagation()}>
            <Checkbox
              checked={isSelected}
              onChange={() => toggleSelect(item.id)}
            />
          </div>

          {/* 已读/未读指示点 */}
          <div className="notify-dot-wrap">
            <span className={`notify-dot ${item.read ? 'read' : 'unread'}`} />
          </div>

          {/* 类型图标 */}
          <div className={`notify-icon ${typeInfo.iconClass}`}>
            <i className={`ti ${typeInfo.icon}`} />
          </div>

          {/* 内容 */}
          <div className="notify-body">
            <div className="notify-title">
              {item.title}
              {!item.read && <span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: '#ff4d4f', marginLeft: 6, verticalAlign: 'middle' }} />}
            </div>
            <div className="notify-desc">{item.author} · {formatRelativeTime(item.time)}</div>
          </div>

          {/* 右侧操作区 */}
          <div className="notify-right" onClick={e => e.stopPropagation()}>
            {item.forced && !item.read && (
              <Tag icon={<i className="ti ti-alert-circle" style={{ fontSize: 14 }} />} color="error">强制确认</Tag>
            )}
            <Tag color={typeInfo.color} style={{ margin: 0 }}>{typeInfo.label}</Tag>
            <Tooltip title={isExpanded ? '收起' : '展开详情'}>
              <Button type="text" size="small" icon={
                <i className={`ti ${isExpanded ? 'ti-chevron-up' : 'ti-chevron-down'}`} style={{ fontSize: 14 }} />
              } onClick={() => {
                if (batchMode) return;
                setExpandedId(isExpanded ? null : item.id);
                if (!item.read) setData(prev => prev.map(d => d.id === item.id ? { ...d, read: true } : d));
              }} />
            </Tooltip>
          </div>
        </div>

        {/* 展开详情 */}
        <div className={'notify-expand-body' + (isExpanded ? ' show' : '')}>
          <div className="notify-expand-card">
            <div><strong>发起人：</strong>{item.author}</div>
            <div><strong>时间：</strong>{item.time.format('YYYY-MM-DD HH:mm:ss')}</div>
            <div><strong>详情：</strong>{item.detail}</div>
            {item.targetId && (
              <div style={{ marginTop: 8 }}>
                <Button type="primary" size="small" ghost onClick={() => {
                  if (item.targetType === 'Opportunity') window.location.href = 'PAGE-PC-02_商机详情页.html';
                  else window.location.href = 'PAGE-PC-05_需求详情页.html';
                }}>
                  查看详情 →
                </Button>
              </div>
            )}
          </div>
        </div>
      </React.Fragment>
    );
  };

  /* ===== 主渲染 ===== */
  return (
    <div className="notify-page">
      {/* Z1 页面头部 */}
      <div className="notify-header">
        <div className="notify-header-left">
          <Space size={8}>
            <i className="ti ti-bell" style={{ fontSize: 22, color: '#1890ff' }} />
            <Typography.Title level={4} style={{ margin: 0 }}>通知中心</Typography.Title>
            <Badge count={unreadCount} overflowCount={99} offset={[4, -4]} size="small" />
          </Space>
          <Segmented
            value={readFilter}
            onChange={v => { setReadFilter(v); setCurrentPage(1); setExpandedId(null); }}
            options={[
              { label: `全部 (${totalCount})`, value: 'all' },
              { label: `未读 (${unreadCount})`, value: 'unread' },
              { label: '已读', value: 'read' },
            ]}
          />
          <Select
            allowClear
            placeholder="通知类型"
            style={{ width: 130 }}
            value={typeFilter}
            onChange={v => { setTypeFilter(v || null); setCurrentPage(1); }}
            options={Object.entries(NOTIFY_TYPE_MAP).map(([k, v]) => ({ label: v.label, value: k }))}
          />
        </div>
        <div className="notify-header-right">
          <Space size={12}>
            <span style={{ fontSize: 13, color: '#595959', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
              <i className="ti ti-filter" style={{ fontSize: 14 }} />
              筛选：仅看未读
              <Switch
                size="small"
                checked={unreadOnly}
                onChange={function(checked) {
                  setUnreadOnly(checked);
                  setReadFilter(checked ? 'unread' : 'all');
                  setCurrentPage(1);
                  setExpandedId(null);
                }}
              />
            </span>
            <Tooltip title="前往通知偏好设置页面">
              <span className="pref-link" onClick={() => window.location.href = 'PAGE-PC-15_通知偏好设置.html'}>
                <i className="ti ti-settings" style={{ fontSize: 14 }} />
                通知偏好
              </span>
            </Tooltip>
          </Space>
        </div>
      </div>

      {/* Z2 工具栏 */}
      {!loading && (
        <div className="notify-toolbar">
          <div className="notify-toolbar-left">
            <Search
              placeholder="搜索通知内容或发起人..."
              allowClear
              size="small"
              style={{ width: 260 }}
              value={searchKey}
              onChange={e => { setSearchKey(e.target.value); setCurrentPage(1); }}
            />
            <Button
              size="small"
              type={batchMode ? 'primary' : 'default'}
              icon={<i className="ti ti-checkbox" style={{ fontSize: 14 }} />}
              onClick={() => { setBatchMode(!batchMode); if (batchMode) setSelectedIds([]); }}
            >
              {batchMode ? '退出批量' : '批量操作'}
            </Button>
          </div>
          <div className="notify-toolbar-right">
            <Button size="small" icon={<i className="ti ti-check" style={{ fontSize: 14 }} />} onClick={markAllRead}>
              全部已读
            </Button>
            <Button size="small" icon={<i className="ti ti-trash" style={{ fontSize: 14 }} />} onClick={clearRead} danger>
              清空已读
            </Button>
          </div>
        </div>
      )}

      {/* 批量操作栏 */}
      {batchMode && selectedIds.length > 0 && (
        <div className="batch-bar">
          <span style={{ fontSize: 13, color: '#0050b3' }}>
            <i className="ti ti-checkbox" style={{ marginRight: 6, verticalAlign: 'middle' }} />
            已选择 <strong>{selectedIds.length}</strong> 条通知
          </span>
          <Space>
            <Button size="small" onClick={markSelectedRead} icon={<i className="ti ti-eye-check" style={{ fontSize: 14 }} />}>
              标记已读
            </Button>
            <Button size="small" danger onClick={deleteSelected} icon={<i className="ti ti-trash" style={{ fontSize: 14 }} />}>
              删除选中
            </Button>
          </Space>
        </div>
      )}

      {/* Z3 通知列表 */}
      {loading ? renderSkeleton() : (
        <div style={{ background: '#fff', borderRadius: 8, boxShadow: '0 1px 2px rgba(0,0,0,0.06)' }}>
          {paged.length > 0 && (
            <div style={{ padding: '10px 20px', borderBottom: '1px solid #f0f0f0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 13, color: '#8c8c8c' }}>
                <i className="ti ti-list" style={{ marginRight: 6, verticalAlign: 'middle', fontSize: 14 }} />
                通知列表
              </span>
              <Button
                size="small"
                type="text"
                icon={<i className="ti ti-check" style={{ fontSize: 14 }} />}
                onClick={markAllRead}
                style={{ color: '#1890ff', fontSize: 12 }}
              >
                标记全部已读
              </Button>
            </div>
          )}
          {batchMode && paged.length > 0 && (
            <div style={{ padding: '8px 20px', borderBottom: '1px solid #f0f0f0', display: 'flex', alignItems: 'center' }}>
              <Checkbox
                checked={paged.length > 0 && paged.every(d => selectedIds.includes(d.id))}
                indeterminate={paged.some(d => selectedIds.includes(d.id)) && !paged.every(d => selectedIds.includes(d.id))}
                onChange={selectAllCurrent}
              >
                <span style={{ fontSize: 12, color: '#8c8c8c' }}>全选当前页</span>
              </Checkbox>
            </div>
          )}

          {paged.length === 0 ? (
            <div className="empty-state">
              <i className="ti ti-bell-off" />
              <div style={{ fontSize: 14, marginBottom: 8 }}>
                {searchKey ? '没有匹配的通知' : readFilter === 'unread' ? '🎉 所有通知已读' : '暂无通知'}
              </div>
              {searchKey && (
                <Button size="small" onClick={() => setSearchKey('')}>清除搜索</Button>
              )}
            </div>
          ) : (
            activeGroups.map(groupKey => (
              <div className="time-section" key={groupKey}>
                <div className="time-section-header">{TIME_GROUP_LABELS[groupKey]}</div>
                {paged.filter(d => getTimeGroup(d.time) === groupKey).map(item => renderNotifyRow(item))}
              </div>
            ))
          )}
        </div>
      )}

      {/* Z4 分页器 */}
      {!loading && filtered.length > pageSize && (
        <div className="page-footer">
          <Pagination
            current={currentPage}
            pageSize={pageSize}
            total={filtered.length}
            onChange={p => { setCurrentPage(p); setExpandedId(null); }}
            showTotal={total => `共 ${total} 条`}
            size="small"
          />
        </div>
      )}

      {/* MODAL-01 强制确认阅读弹窗 */}
      <Modal
        title={
          <span>
            <i className="ti ti-alert-triangle" style={{ color: '#ff4d4f', marginRight: 8, verticalAlign: 'middle', fontSize: 18 }} />
            强制确认阅读
          </span>
        }
        open={modalVisible}
        onCancel={() => {}}
        maskClosable={false}
        closable={false}
        width={640}
        footer={[
          <Button
            key="confirm"
            type="primary"
            disabled={!checked}
            onClick={handleModalConfirm}
            icon={<i className="ti ti-check" />}
          >
            确认已读
          </Button>,
        ]}
      >
        {modalItem && (
          <div>
            <Typography.Title level={5} style={{ color: '#cf1322' }}>
              <i className="ti ti-exclamation-circle" style={{ marginRight: 6 }} />
              {modalItem.title}
            </Typography.Title>
            <Typography.Paragraph style={{ color: '#595959' }}>
              本通知涉及重要业务变更，请仔细阅读以下内容后确认：
            </Typography.Paragraph>
            <Card size="small" style={{ marginBottom: 16, background: '#fff7e6', border: '1px solid #ffd591' }}>
              <p><strong>变更摘要：</strong>{modalItem.title}</p>
              <p><strong>发起人：</strong>{modalItem.author}</p>
              <p><strong>时间：</strong>{modalItem.time.format('YYYY-MM-DD HH:mm:ss')}</p>
              <p style={{ color: '#8c8c8c', fontSize: 12, marginTop: 8 }}>
                该变更将影响相关方案和需求的处理流程，请各相关人员知悉并按新流程执行。
              </p>
            </Card>
            <Checkbox checked={checked} onChange={e => setChecked(e.target.checked)}>
              <span style={{ fontWeight: 500 }}>我已阅读并知悉以上变更内容</span>
            </Checkbox>
          </div>
        )}
      </Modal>
    </div>
  );
}

window.PROTO_SHELL && window.PROTO_SHELL.renderShell('notify-center');
  // 埋点：页面浏览
  if (window.DataTracker) { window.DataTracker.trackPageView('notify-center', '通知中心'); }

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(NotifyCenter));
</script>
</body>
</html>
