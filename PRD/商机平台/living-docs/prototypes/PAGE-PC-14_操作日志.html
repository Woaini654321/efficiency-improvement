  { id:3, time:'2026-05-29 09:30:00', operator:'Amy.Zhao 赵敏(GQ10102)', name:'Amy.Zhao 赵敏', empNo:'GQ10102', actionType:'下架', target:'方案#BIZ-20260528-015', result:'成功', ip:'10.20.31.12', ua:'Mozilla/5.0 (Macintosh) Safari/605.1', before:{ status:'已发布' }, after:{ status:'已下架', reason:'信息过期' }},
  { id:4, time:'2026-05-28 17:45:33', operator:'Owen.Liu 刘洋(GQ10045)', name:'Owen.Liu 刘洋', empNo:'GQ10045', actionType:'删除', target:'方案#BIZ-20260520-008', result:'成功', ip:'10.20.30.78', ua:'Mozilla/5.0 (Windows NT 10.0) Edge/125.0', before:{ id:'BIZ-20260520-008', title:'车载模组需求' }, after:null },

function AuditLogPage() {

  const [actionFilter, setActionFilter] = useState(undefined);
  const [resultFilter, setResultFilter] = useState(undefined);
  const [sensitiveOnly, setSensitiveOnly] = useState(false);
  const [dateRange, setDateRange] = useState([dayjs().subtract(7,'day'), dayjs()]);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [currentRecord, setCurrentRecord] = useState(null);
  const [exportLoading, setExportLoading] = useState(false);

  const filteredData = useMemo(() => {
    return mockData.filter(item => {
      if (searchText && !item.operator.includes(searchText) && !item.target.includes(searchText)) return false;
      if (actionFilter && item.actionType !== actionFilter) return false;
      if (resultFilter && item.result !== resultFilter) return false;
      if (sensitiveOnly && SENSITIVE_ACTIONS.indexOf(item.actionType) < 0) return false;
      if (dateRange && dateRange[0] && dateRange[1]) {
        const t = dayjs(item.time);
        if (t.isBefore(dateRange[0], 'day') || t.isAfter(dateRange[1], 'day')) return false;
      }
      return true;
    });
  }, [searchText, actionFilter, resultFilter, sensitiveOnly, dateRange]);

  // 操作统计
  var todayTotal = mockData.filter(function(r) { return dayjs(r.time).isSame(dayjs(), 'day'); }).length;
  var todaySensitive = mockData.filter(function(r) { return dayjs(r.time).isSame(dayjs(), 'day') && SENSITIVE_ACTIONS.indexOf(r.actionType) >= 0; }).length;

    var names = {};
    mockData.filter(function(r) { return dayjs(r.time).isSame(dayjs(), 'day'); }).forEach(function(r) { names[r.name] = true; });
    return Object.keys(names).length;
  })();

  const handleExport = () => {
    if (exportLoading) return;
    setExportLoading(true);
    message.loading({ content: '导出中...', key: 'export', duration: 3 });
    setTimeout(() => {
      if (filteredData.length > 10000) {
        message.warning({ content: 'BR-061: 单次导出不超过10000条，请缩小筛选范围', key: 'export' });
      } else {
        message.success({ content: '导出完成', key: 'export' });
      }
      setExportLoading(false);
    }, 2000);
  };

  const renderActionTag = (type) => {
    var ac = ACTION_ICONS[type] || { icon:'ti-circle', color:'#666', bg:'#f5f5f5' };
    var isSensitive = SENSITIVE_ACTIONS.includes(type);
    return React.createElement('div', { style:{display:'flex', alignItems:'center', gap:6} },
      React.createElement('div', { style:{width:28, height:28, borderRadius:8, background:ac.bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0} },
        React.createElement('i', { className:'ti '+ac.icon, style:{fontSize:14, color:ac.color} })
      ),
      React.createElement(Tag, { color: isSensitive ? 'red' : 'blue' }, type)

  };

  const renderOperator = (operator, name) => {
    var idx = (name || operator || '').charCodeAt(0) % OPERATOR_AVATARS.length;
    var initial = (name || operator || '?').charAt(0);

      React.createElement('div', { style:{width:28, height:28, borderRadius:'50%', background:OPERATOR_AVATARS[idx], display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:12, fontWeight:600, flexShrink:0} }, initial),
      React.createElement('span', { style:{fontSize:13} }, operator)

  };

  const renderResultTag = (result) => {
    return React.createElement(Tag, { color: result === '成功' ? 'green' : 'red' }, result);
  };

  const columns = [

    { title: '操作人', dataIndex: 'operator', key: 'operator', width: 180, render: (op, record) => renderOperator(op, record.name) },

      [

        { label: '敏感操作', value: todaySensitive, color: todaySensitive > 0 ? '#ff4d4f' : '#52c41a', icon:'ti-alert-triangle', bg: todaySensitive > 0 ? '#fff1f0' : '#f6ffed' },

      ].map(function(c) {
        return React.createElement(Col, { span: 6, key: c.label },

              ),
              React.createElement(Statistic, { title: c.label, value: c.value, valueStyle: { color: c.color, fontSize: 22 } })
            )
          )
        );
      })
    ),
    // Z1 筛选栏
    React.createElement('div', { className: 'filter-bar' },
      React.createElement('span', { className: 'filter-bar-title' }, '操作日志'),

      React.createElement(Select, { placeholder: '操作类型', style: { width: 160 }, allowClear: true, value: actionFilter, onChange: v => setActionFilter(v),
        options: [{ label:'全部', value: undefined }].concat(ACTION_TYPES.map(t => ({ label: t, value: t })))
      }),
      React.createElement(Select, { placeholder: '操作结果', style: { width: 120 }, allowClear: true, value: resultFilter, onChange: v => setResultFilter(v),
        options: [{ label: '成功', value: '成功' }, { label: '失败', value: '失败' }]
      }),
      React.createElement(RangePicker, { value: dateRange, onChange: v => setDateRange(v), style: { width: 260 } }),
      React.createElement(Button, { type: sensitiveOnly ? 'primary' : 'default', size: 'small', danger: sensitiveOnly, onClick: function() { setSensitiveOnly(!sensitiveOnly); } },
        React.createElement('i', {className:'ti ti-alert-triangle', style:{fontSize:18, marginRight:4}}), '仅敏感'
      ),
      React.createElement(Button, { icon: React.createElement('i', {className:'ti ti-file-export', style:{fontSize:18}}), loading: exportLoading, onClick: handleExport }, '导出'),
    ),
    // Z2 列表
    React.createElement(Table, {
      footer: function() {
        return React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },

            React.createElement('i', { className: 'ti ti-archive', style: { fontSize: 18, marginRight: 4 } }),
            '日志保留策略：90天热存储 + 180天冷存储 (BR-062)'
          ),
          React.createElement('span', { style: { color: '#999', fontSize: 12 } }, '共 ' + filteredData.length + ' 条记录')
        );
      },
      rowKey: 'id',
      columns,
      dataSource: filteredData,
      locale: { emptyText: React.createElement(Empty, { description: 'EX-030: 暂无操作日志' }) },
      pagination: { defaultPageSize: 50, pageSizeOptions: ['20','50','100'], showSizeChanger: true, showTotal: total => '共 ' + total + ' 条' },
    }),
    // DRAWER-01 日志详情
    React.createElement(Drawer, {
      title: '日志详情', width: 560, open: drawerOpen, onClose: () => setDrawerOpen(false),
      footer: React.createElement('div', { style: { textAlign: 'right' } }, React.createElement(Button, { onClick: () => setDrawerOpen(false) }, '关闭')),
    },
      currentRecord && React.createElement('div', null,
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, '操作时间'), React.createElement('div', null, currentRecord.time)),
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, '操作人'), React.createElement('div', null, currentRecord.name + '(' + currentRecord.empNo + ')')),
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, '操作类型'), renderActionTag(currentRecord.actionType)),
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, '操作对象'), React.createElement('div', null, currentRecord.target)),
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, '结果'), renderResultTag(currentRecord.result)),
        React.createElement('div', { className: 'drawer-field' }, React.createElement('div', { className: 'drawer-label' }, 'IP地址'), React.createElement('div', null, currentRecord.ip)),
        React.createElement('div', { style: { display: 'flex', gap: 12 } },

            React.createElement('div', { className: 'drawer-label', style: { color: '#ff4d4f', fontWeight: 600 } }, '变更后'),
            currentRecord.after ? React.createElement('pre', { className: 'json-block', style: { borderColor: '#ffa39e' } }, JSON.stringify(currentRecord.after, null, 2)) : React.createElement(Tag, { color: 'red' }, '已删除')

      )
    )
  );
